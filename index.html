<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Word Forge - Macaron Mastery</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --m-pink: #ffafcc;
            --m-blue: #bde0fe;
            --m-green: #caffbf;
            --m-yellow: #fdffb6;
            --m-purple: #cdb4db;
            --ink: #4a4a4a;
        }

        body {
            background: #fff5f8;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            font-family: 'Lora', serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .main-panel {
            background: white;
            width: 90vw;
            max-width: 1000px;
            height: 85vh;
            padding: 30px;
            border: 10px solid var(--m-pink);
            clip-path: polygon(0% 1%, 100% 0%, 99% 99%, 1% 100%);
            box-shadow: 15px 15px 0px var(--m-blue);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--m-blue);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .view-section { display: none; flex: 1; flex-direction: column; overflow-y: auto; }
        .view-section.active { display: flex; }

        /* Step 1: Forge */
        .slot-container { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .slot {
            width: 90px; height: 90px; border: 3px dashed var(--m-blue);
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-family: 'Cinzel'; font-size: 0.8rem; background: #fafafa;
        }
        .slot.correct { background: var(--m-yellow); border-style: solid; font-size: 1.2rem; transform: scale(1.05); }

        .rune {
            background: white; border: 2px solid var(--m-blue);
            padding: 10px 20px; border-radius: 12px; cursor: grab;
            font-family: 'Cinzel'; font-weight: bold; margin: 5px;
            box-shadow: 3px 3px 0 var(--m-blue);
        }

        /* Step 2: 12 Sentences */
        .sentence-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .s-card { background: var(--m-green); padding: 10px; border-radius: 8px; font-size: 0.85rem; }
        .hl { color: #ff6b6b; font-weight: bold; }

        /* Step 3: Cloze */
        .cloze-box { text-align: center; padding: 40px; }
        .cloze-input {
            border: none; border-bottom: 3px solid var(--m-pink);
            width: 250px; font-size: 1.5rem; text-align: center; outline: none;
            font-family: 'Lora'; color: #ff85a1;
        }
        .cloze-input.valid { background: #e0ffcd; }

        .btn-magic {
            background: var(--m-blue); border: none; padding: 12px 30px;
            font-family: 'Cinzel'; font-weight: bold; border-radius: 25px;
            cursor: pointer; align-self: center; margin-top: 20px;
            box-shadow: 0 4px 0 #90e0ef; transition: 0.2s;
        }
        .btn-magic:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #90e0ef; }

        .orb { width: 40px; height: 40px; border-radius: 50%; background: var(--m-pink); box-shadow: 0 0 10px var(--m-pink); }
    </style>
</head>
<body>

    <div class="main-panel">
        <header>
            <div>
                <h1 style="font-family:'Cinzel'; margin:0; color:var(--m-pink);">WORD FORGE</h1>
                <small id="word-meta">Loading scrolls...</small>
            </div>
            <div class="orb"></div>
        </header>

        <section id="step-1" class="view-section active">
            <h2 id="target-title" style="text-align:center; font-family:'Cinzel';">TARGET: ???</h2>
            <div class="slot-container" id="slots"></div>
            <div style="display:flex; flex-wrap:wrap; justify-content:center;" id="pool"></div>
        </section>

        <section id="step-2" class="view-section">
            <h2 style="font-family:'Cinzel'; color:var(--m-pink);">Contextual Mastery (12 Sentences)</h2>
            <div class="sentence-grid" id="sentence-list"></div>
            <button class="btn-magic" onclick="showStep(3)">Next: Cloze Quiz ➔</button>
        </section>

        <section id="step-3" class="view-section cloze-box">
            <h2 style="font-family:'Cinzel';">Reading Cloze</h2>
            <p id="cloze-text" style="font-size:1.2rem; line-height:2;"></p>
            <input type="text" id="user-input" class="cloze-input" placeholder="Type the word here...">
            <p id="feedback" style="margin-top:10px; font-weight:bold;"></p>
            <button id="to-game" class="btn-magic" style="display:none;" onclick="showStep(4)">Next: Root Match ➔</button>
        </section>

        <section id="step-4" class="view-section" style="text-align:center;">
            <h2 style="font-family:'Cinzel';">Root Family Match</h2>
            <p id="root-task"></p>
            <div style="display:flex; justify-content:center; gap:10px;" id="game-options"></div>
            <button class="btn-magic" onclick="nextWord()" style="margin-top:40px;">Finish & Next Word ➔</button>
        </section>
    </div>

    <script>
        let db = null;
        let currentIdx = 0;
        let currentWord = null;
        let solvedSlots = 0;

        // 啟動系統
        async function start() {
            const res = await fetch('words.json');
            db = await res.json();
            loadChallenge(0);
        }

        function loadChallenge(idx) {
            currentIdx = idx;
            solvedSlots = 0;
            currentWord = db.formulas[currentIdx % db.formulas.length];
            
            // UI 重置
            document.getElementById('target-title').innerText = `TARGET: ${currentWord.word}`;
            document.getElementById('word-meta').innerText = `Lexile: ${currentWord.lexile_level} | Level: Advanced`;
            document.getElementById('feedback').innerText = "";
            document.getElementById('user-input').value = "";
            document.getElementById('to-game').style.display = "none";

            // 生成插槽 (基於字庫配方)
            const slotArea = document.getElementById('slots');
            slotArea.innerHTML = '';
            currentWord.formula.forEach(id => {
                const comp = db.components.find(c => c.id === id);
                const div = document.createElement('div');
                div.className = 'slot';
                div.dataset.ans = comp.value;
                div.innerText = comp.type.toUpperCase();
                
                div.ondragover = e => e.preventDefault();
                div.ondrop = handleDrop;
                slotArea.appendChild(div);
            });

            // 生成零件
            const pool = document.getElementById('pool');
            pool.innerHTML = '';
            const correctParts = currentWord.formula.map(id => db.components.find(c => c.id === id).value);
            const decoys = ["re-", "port", "in-", "struct", "ion"];
            const allParts = [...new Set([...correctParts, ...decoys])].sort(() => Math.random() - 0.5);

            allParts.forEach(val => {
                const r = document.createElement('div');
                r.className = 'rune';
                r.draggable = true;
                r.innerText = val;
                r.ondragstart = e => e.dataTransfer.setData('text', val);
                pool.appendChild(r);
            });

            showStep(1);
        }

        function handleDrop(e) {
            const val = e.dataTransfer.getData('text');
            if (val === this.dataset.ans) {
                this.innerText = val;
                this.classList.add('correct');
                solvedSlots++;
                if (solvedSlots === currentWord.formula.length) {
                    setTimeout(() => startSentences(), 600);
                }
            } else {
                this.style.background = "#ffafcc";
                setTimeout(() => this.style.background = "#fafafa", 400);
            }
        }

        function startSentences() {
            const list = document.getElementById('sentence-list');
            list.innerHTML = '';
            // 這裡模擬 12 句，實際可擴充字庫增加 sentence 陣列
            for (let i = 1; i <= 12; i++) {
                const card = document.createElement('div');
                card.className = 's-card';
                card.innerHTML = `<b>${i}.</b> This is a context where <span class="hl">${currentWord.word}</span> makes perfect sense in sentence ${i}.`;
                list.appendChild(card);
            }

            // 準備填空題
            document.getElementById('cloze-text').innerHTML = currentWord.usage_example.replace(new RegExp(currentWord.word, 'gi'), "______");
            
            // 監聽填空輸入
            document.getElementById('user-input').oninput = function() {
                if (this.value.toLowerCase() === currentWord.word.toLowerCase()) {
                    this.classList.add('valid');
                    document.getElementById('feedback').innerText = "✨ Magic Word Detected!";
                    document.getElementById('to-game').style.display = "inline-block";
                }
            };

            // 準備遊戲
            document.getElementById('root-task').innerText = `Which word shares the root of ${currentWord.word}?`;
            const gPool = document.getElementById('game-options');
            gPool.innerHTML = `<div class="rune" onclick="alert('Correct!')">Dictionary</div><div class="rune">Portable</div>`;

            showStep(2);
        }

        function nextWord() {
            loadChallenge(currentIdx + 1);
        }

        function showStep(n) {
            document.querySelectorAll('.view-section').forEach((s, i) => {
                s.classList.toggle('active', i === (n-1));
            });
        }

        window.onload = start;
    </script>
</body>
</html>
