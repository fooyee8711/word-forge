<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Word Forge - Master Storyteller Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --m-pink: #ffafcc; --m-blue: #bde0fe; --m-green: #caffbf; --m-yellow: #fdffb6; --m-purple: #cdb4db; --ink: #4a4a4a;
        }

        body {
            background: #fff5f8; background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            font-family: 'Lora', serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }

        .main-panel {
            background: white; width: 92vw; max-width: 1100px; height: 88vh; padding: 35px; border: 8px solid var(--m-pink);
            clip-path: polygon(0.5% 1%, 99.5% 0%, 100% 99%, 0.5% 100%);
            box-shadow: 15px 15px 0px var(--m-blue); display: flex; flex-direction: column; position: relative;
        }

        header { display: flex; justify-content: space-between; border-bottom: 3px solid var(--m-blue); padding-bottom: 15px; margin-bottom: 15px; }

        .view-section { display: none; flex: 1; flex-direction: column; overflow-y: auto; padding: 10px; }
        .view-section.active { display: flex; }

        /* Step 1: Forge */
        .slot-container { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .slot {
            width: 110px; height: 110px; border: 3px dashed var(--m-blue); border-radius: 20px;
            display: flex; align-items: center; justify-content: center; font-family: 'Cinzel'; 
            background: #fafafa; font-size: 0.7rem; color: #aaa; text-align: center;
        }
        .slot.correct { 
            background: var(--m-yellow); border: 3px solid var(--m-pink); font-size: 1.3rem; 
            color: var(--ink); transform: scale(1.1); box-shadow: 0 0 15px var(--m-yellow);
        }

        .rune-pool { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 20px; }
        .rune {
            background: white; border: 2px solid var(--m-blue); padding: 12px 22px; border-radius: 15px;
            cursor: grab; font-family: 'Cinzel'; font-weight: bold; box-shadow: 4px 4px 0 var(--m-blue); transition: 0.2s;
        }
        .rune:active { cursor: grabbing; }

        /* Step 2: Story */
        .story-box {
            background: var(--m-yellow); padding: 30px; border-radius: 25px; border: 2px dashed var(--m-pink);
            line-height: 2; font-size: 1.2rem; color: #444;
        }
        .story-word-hl { color: #ff6b6b; font-weight: 800; border-bottom: 2px solid var(--m-pink); padding: 0 4px; }

        /* Step 3: Cloze */
        .cloze-box { text-align: center; padding: 40px; }
        .cloze-input {
            border: none; border-bottom: 4px solid var(--m-pink); width: 320px; font-size: 2rem;
            text-align: center; outline: none; font-family: 'Lora'; color: #ff85a1; background: transparent;
        }
        .cloze-input.valid { background: #e0ffcd; border-radius: 10px; }

        .btn-magic {
            background: var(--m-blue); border: none; padding: 15px 45px; font-family: 'Cinzel';
            font-weight: bold; border-radius: 30px; cursor: pointer; align-self: center; margin: 30px 0;
            box-shadow: 0 5px 0 #90e0ef; font-size: 1.2rem; transition: 0.2s;
        }
        .btn-magic:hover { transform: translateY(-3px); box-shadow: 0 8px 0 #90e0ef; }

        .orb { width: 45px; height: 45px; border-radius: 50%; background: var(--m-pink); box-shadow: 0 0 15px var(--m-pink); }
    </style>
</head>
<body>

    <div class="main-panel">
        <header>
            <div>
                <h1 style="font-family:'Cinzel'; margin:0; color:var(--m-pink);">WORD FORGE</h1>
                <small id="word-meta" style="color: #888;">Amelia's Laboratory</small>
            </div>
            <div class="orb"></div>
        </header>

        <section id="step-1" class="view-section active">
            <h2 id="target-title" style="text-align:center; font-family:'Cinzel';">TARGET BLUEPRINT</h2>
            <div class="slot-container" id="slots"></div>
            <div class="rune-pool" id="pool"></div>
        </section>

        <section id="step-2" class="view-section">
            <h2 style="font-family:'Cinzel'; color:var(--m-pink); text-align: center;">📖 The Forged Tale</h2>
            <div class="story-box" id="story-content"></div>
            <button class="btn-magic" onclick="showStep(3)">Mastered! Go to Quiz ➔</button>
        </section>

        <section id="step-3" class="view-section cloze-box">
            <h2 style="font-family:'Cinzel';">The Final Spell</h2>
            <div style="background: rgba(255,255,255,0.6); padding: 30px; border-radius: 25px; border: 2px dashed var(--m-blue);">
                <p id="cloze-text" style="font-size:1.5rem;"></p>
                <input type="text" id="user-input" class="cloze-input" autocomplete="off" placeholder="Write word here...">
                <p id="feedback" style="margin-top:20px; font-weight:bold; color: #ff6b6b; height: 20px;"></p>
            </div>
            <button id="to-game" class="btn-magic" style="display:none;" onclick="showStep(4)">Next: Family Discovery ➔</button>
        </section>

        <section id="step-4" class="view-section" style="text-align:center;">
            <h2 style="font-family:'Cinzel'; color: var(--m-purple);">Family Discovery</h2>
            <p id="root-task" style="font-size: 1.3rem; margin: 20px 0;"></p>
            <div style="display:flex; justify-content:center; gap:20px;" id="game-options"></div>
            <button class="btn-magic" onclick="nextWord()" style="margin-top:50px;">Next Word Blueprint ➔</button>
        </section>
    </div>

    <script>
        let wordData = []; let currentIdx = 0; let currentWord = null; let solvedSlots = 0;
        const componentsMap = {}; 

        async function init() {
            try {
                const res = await fetch('words.json');
                const data = await res.json();
                wordData = data.formulas;
                data.components.forEach(c => componentsMap[c.id] = c.value);
                loadWord(0);
            } catch(e) {
                console.error("Data Load Error:", e);
                alert("Please ensure words.json is in the same folder!");
            }
        }

        function loadWord(idx) {
            currentIdx = idx; solvedSlots = 0;
            currentWord = wordData[currentIdx % wordData.length];
            
            document.getElementById('target-title').innerText = `TARGET: ${currentWord.word}`;
            document.getElementById('word-meta').innerText = `Lexile: ${currentWord.lexile_level} | Forging Progress: 0%`;
            document.getElementById('feedback').innerText = "";
            document.getElementById('user-input').value = "";
            document.getElementById('user-input').classList.remove('valid');
            document.getElementById('to-game').style.display = "none";

            // 插槽生成邏輯修復
            const slotArea = document.getElementById('slots'); slotArea.innerHTML = '';
            currentWord.formula.forEach(id => {
                const ansValue = componentsMap[id];
                const typeLabel = id.split('_')[0].replace('P','PREFIX').replace('R','ROOT').replace('S','SUFFIX');
                
                const div = document.createElement('div');
                div.className = 'slot'; 
                div.dataset.ans = ansValue; // 這裡存的是正確字串，例如 "un-"
                div.innerText = typeLabel;
                
                div.ondragover = e => e.preventDefault();
                div.ondrop = handleDrop;
                slotArea.appendChild(div);
            });

            // 零件池生成
            const pool = document.getElementById('pool'); pool.innerHTML = '';
            const correct = currentWord.formula.map(id => componentsMap[id]);
            const decoys = ["re-", "in-", "struct", "port", "-ion", "-ize", "trans-"];
            const all = [...new Set([...correct, ...decoys])].sort(() => Math.random() - 0.5);
            
            all.forEach(val => {
                const r = document.createElement('div'); 
                r.className = 'rune'; r.draggable = true;
                r.innerText = val; 
                r.ondragstart = e => e.dataTransfer.setData('text/plain', val);
                pool.appendChild(r);
            });
            showStep(1);
        }

        function handleDrop(e) {
            e.preventDefault();
            const droppedVal = e.dataTransfer.getData('text/plain');
            
            if (droppedVal === this.dataset.ans) {
                this.innerText = droppedVal; 
                this.classList.add('correct');
                solvedSlots++;
                
                // 檢查是否所有插槽都填滿了
                const totalRequired = currentWord.formula.length;
                if (solvedSlots === totalRequired) {
                    document.getElementById('word-meta').innerText = `Forging Progress: 100% - Success!`;
                    setTimeout(() => startStory(), 800); // 稍微延遲讓孩子看見最後一個零件放進去
                }
            } else {
                this.style.background = "#ffafcc"; // 閃粉色表示錯誤
                setTimeout(() => this.style.background = "#fafafa", 400);
            }
        }

        function startStory() {
            const storyBox = document.getElementById('story-content');
            // 高亮故事中的關鍵字
            const regex = new RegExp(`(${currentWord.word})`, 'gi');
            const storyHTML = currentWord.story.replace(regex, `<span class="story-word-hl">$1</span>`);
            storyBox.innerHTML = storyHTML;

            // 設置填空題
            document.getElementById('cloze-text').innerHTML = currentWord.usage_example.replace(regex, "______");
            
            document.getElementById('user-input').oninput = function() {
                if (this.value.toLowerCase().trim() === currentWord.word.toLowerCase()) {
                    this.classList.add('valid');
                    document.getElementById('feedback').innerText = "✨ MAGIC SPELL CORRECT! ✨";
                    document.getElementById('to-game').style.display = "inline-block";
                }
            };
            
            // 設置遊戲題目
            document.getElementById('root-task').innerText = `Which word shares the root of ${currentWord.word}?`;
            const gPool = document.getElementById('game-options');
            gPool.innerHTML = `<div class="rune" onclick="alert('Brilliant!')">Option A</div><div class="rune" onclick="alert('Keep Exploring!')">Option B</div>`;
            
            showStep(2);
        }

        function nextWord() { loadWord(currentIdx + 1); }
        function showStep(n) {
            document.querySelectorAll('.view-section').forEach((s, i) => s.classList.toggle('active', i === (n-1)));
        }
        window.onload = init;
    </script>
</body>
</html>
