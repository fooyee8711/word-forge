<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Word Forge - 詞彙鍛造爐 終極終端</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+TC:wght@500;700&display=swap');

        :root {
            --bg-paper: #f2e8d5;
            --ink: #3a2e2a;
            --magic-blue: #4ea8de;
            --magic-gold: #d4a373;
            --border: rgba(58, 46, 42, 0.2);
        }

        body {
            background-color: #dcd0b9;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            font-family: 'Noto Serif TC', serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--ink);
        }

        /* 四宮格大框架 */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            width: 95vw;
            max-width: 1400px;
            height: 90vh;
            padding: 20px;
        }

        /* 通用面板樣式 (羊皮紙感) */
        .panel {
            background: var(--bg-paper);
            border-radius: 5px;
            position: relative;
            border: 1px solid var(--border);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 20px;
            /* 模擬撕裂紙張邊緣 */
            clip-path: polygon(0% 2%, 2% 0%, 98% 1%, 100% 3%, 99% 97%, 98% 100%, 2% 98%, 0% 95%);
        }

        /* 標題與個人資訊 */
        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .logo-title h1 {
            font-family: 'Cinzel', serif;
            margin: 0;
            font-size: 1.5rem;
            color: #1a3a5a;
        }

        .user-status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
        }

        .stability-orb {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #a8e6cf, #10b981);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
        }

        /* --- 1. INDEX PORTAL (左上) --- */
        .index-grid {
            display: flex;
            align-items: center;
            justify-content: space-around;
            flex: 1;
        }
        .nav-menu {
            list-style: none;
            padding: 0;
        }
        .nav-item {
            margin: 15px 0;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-item:hover { color: var(--magic-blue); transform: translateX(5px); }

        /* --- 2. DAILY SPRINT (右上) --- */
        .sprint-wheel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .gear-center {
            width: 150px;
            height: 150px;
            border: 8px dashed var(--magic-blue);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- 3. TECH TREE (左下) --- */
        .tree-area {
            flex: 1;
            background: radial-gradient(circle at center, rgba(78, 168, 222, 0.1) 0%, transparent 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .constellation-tree {
            font-size: 5rem;
            color: var(--ink);
            opacity: 0.8;
        }

        /* --- 4. ARCHIVE (右下) --- */
        .archive-list {
            margin-top: 10px;
            border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.3);
            border-radius: 5px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
        }
        .archive-item {
            padding: 8px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
        }

        /* 按鈕風格 */
        .btn {
            background: none;
            border: 1px solid var(--ink);
            padding: 5px 15px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="panel">
            <div class="header-info">
                <div class="logo-title">
                    <h1>WORD FORGE 詞彙鍛造爐</h1>
                </div>
                <div class="user-status">
                    <span>Amelia (8y)</span>
                    <div class="stability-orb">100%</div>
                </div>
            </div>
            <div class="index-grid">
                <div style="font-size: 4rem;">🧭</div>
                <ul class="nav-menu">
                    <li class="nav-item">🏃 Daily Sprint</li>
                    <li class="nav-item">⚙️ Tech Tree</li>
                    <li class="nav-item">📜 Archive</li>
                </ul>
            </div>
        </div>

        <div class="panel">
            <h2 style="font-family: 'Cinzel'; text-align: center;">DAILY SPRINT</h2>
            <div class="sprint-wheel">
                <div class="gear-center">🏃</div>
                <div style="position: absolute; bottom: 0;">30 / 30 Words</div>
            </div>
            <div style="background: #fff; padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px solid #ddd;">
                <strong>SYNCHRONIZE</strong><br>
                <small>To cause to occur at the same time.</small>
            </div>
        </div>

        <div class="panel">
            <h2 style="font-family: 'Cinzel';">TECH TREE <small>(Level 4)</small></h2>
            <div class="tree-area">
                <div class="constellation-tree">🌳</div>
                <div style="position: absolute; top: 20%; right: 10%; background: white; padding: 10px; border-radius: 10px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);">
                    <strong>ORION</strong><br>
                    <small>Astronomy Node</small>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2 style="font-family: 'Cinzel';">ARCHIVE</h2>
            <input type="text" placeholder="Search Runes..." style="width: 100%; padding: 5px; border: 1px solid #ccc; background: rgba(255,255,255,0.5);">
            <div class="archive-list">
                <div class="archive-item"><span>錬金術 (Alchemy)</span> <span>★ ★ ★</span></div>
                <div class="archive-item"><span>GEOMETRY</span> <span>★ ★ ☆</span></div>
                <div class="archive-item"><span>HERBOLOGY</span> <span>★ ★ ★</span></div>
                <div class="archive-item"><span>ASTRONOMY</span> <span>★ ★ ☆</span></div>
            </div>
            <div style="text-align: center; margin-top: 10px;">
                <span style="font-size: 3rem;">📖</span>
            </div>
        </div>

    </div>

</body>
</html>
