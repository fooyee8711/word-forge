<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Forge - Terminal</title>
    <style>
        /* 現代科技實驗室風格 (Cyber/Lab UI) */
        body {
            background-color: #0d1117; /* 深色科技背景 */
            color: #c9d1d9;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
            user-select: none;
        }

        h1 {
            color: #58a6ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            width: 600px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
            margin-bottom: 30px;
            font-size: 0.9rem;
            color: #8b949e;
        }

        #stability-bar {
            color: #3fb950;
            font-weight: bold;
        }

        /* 藍圖插槽區 */
        .blueprint {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            background: rgba(22, 27, 34, 0.5);
            padding: 30px;
            border: 1px dashed #30363d;
            border-radius: 10px;
        }

        .slot {
            width: 120px;
            height: 60px;
            border: 2px solid #30363d;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #8b949e;
            transition: all 0.2s ease;
        }

        /* 插槽狀態特效 */
        .slot.drag-over {
            border-color: #58a6ff;
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.5);
            background-color: rgba(88, 166, 255, 0.1);
        }

        .slot.success {
            border-color: #3fb950;
            color: #3fb950;
            box-shadow: 0 0 15px rgba(63, 185, 80, 0.4);
            background-color: rgba(63, 185, 80, 0.1);
        }

        .slot.error {
            border-color: #f85149;
            box-shadow: 0 0 15px rgba(248, 81, 73, 0.4);
            background-color: rgba(248, 81, 73, 0.1);
        }

        /* 零件庫區 */
        .parts-pool {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            width: 600px;
            padding: 20px;
            background: #161b22;
            border-radius: 8px;
            border: 1px solid #21262d;
        }

        .part {
            background-color: #21262d;
            border: 1px solid #30363d;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: grab;
            font-size: 1.1rem;
            font-weight: bold;
            color: #e6edf3;
            transition: transform 0.1s;
        }

        .part:active {
            cursor: grabbing;
            transform: scale(0.95);
        }

        .part.hidden {
            visibility: hidden; /* 拖入成功後隱藏原零件 */
        }

        /* 翻譯與訊息終端機 */
        .console {
            margin-top: 40px;
            width: 600px;
            height: 100px;
            background: #000;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            color: #3fb950;
            overflow: hidden;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>

    <h1>Word Forge</h1>
    <div class="hud">
        <span>Operator: AMELIA // Level: Novice Splicer</span>
        <span>Stability: <span id="stability-bar">100%</span></span>
    </div>

    <div style="margin-bottom: 20px; color: #8b949e;">
        > TARGET BLUEPRINT: <span style="color: #fff; font-weight: bold; font-size: 1.2rem;">DESTRUCTION</span>
    </div>

    <div class="blueprint">
        <div class="slot" data-type="prefix" id="slot-prefix">Prefix</div>
        <div class="slot" data-type="root" id="slot-root">Root</div>
        <div class="slot" data-type="suffix" id="slot-suffix">Suffix</div>
    </div>

    <div class="parts-pool">
        <div class="part" draggable="true" data-type="prefix" data-value="un-">un-</div>
        <div class="part" draggable="true" data-type="suffix" data-value="-able">-able</div>
        <div class="part" draggable="true" data-type="root" data-value="struct">struct</div>
        <div class="part" draggable="true" data-type="prefix" data-value="de-">de-</div>
        <div class="part" draggable="true" data-type="root" data-value="port">port</div>
        <div class="part" draggable="true" data-type="suffix" data-value="-ion">-ion</div>
    </div>

    <div class="console" id="console-log">
        > System ready. Awaiting module insertion...
    </div>

    <script>
        // 目標配方設定
        const targetFormula = {
            prefix: "de-",
            root: "struct",
            suffix: "-ion"
        };

        // 穩定度設定
        let stability = 100;
        let completedSlots = 0;

        const parts = document.querySelectorAll('.part');
        const slots = document.querySelectorAll('.slot');
        const consoleLog = document.getElementById('console-log');
        const stabilityBar = document.getElementById('stability-bar');

        let draggedPart = null;

        // 1. 設定拖曳事件 (零件端)
        parts.forEach(part => {
            part.addEventListener('dragstart', function(e) {
                draggedPart = this;
                // 為了相容性，設定傳輸資料
                e.dataTransfer.setData('text/plain', this.dataset.value);
            });

            part.addEventListener('dragend', function() {
                draggedPart = null;
            });
        });

        // 2. 設定放置事件 (插槽端)
        slots.forEach(slot => {
            slot.addEventListener('dragover', function(e) {
                e.preventDefault(); // 必須阻止預設行為才能允許放置
                if (!this.classList.contains('success')) {
                    this.classList.add('drag-over');
                }
            });

            slot.addEventListener('dragleave', function() {
                this.classList.remove('drag-over');
            });

            slot.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('drag-over');

                if (!draggedPart || this.classList.contains('success')) return;

                const slotType = this.dataset.type; // prefix, root, or suffix
                const partValue = draggedPart.dataset.value;
                const partType = draggedPart.dataset.type;

                // 邏輯驗證：檢查零件類型是否正確，且值是否符合目標配方
                if (partType === slotType && partValue === targetFormula[slotType]) {
                    // 驗證成功 (綠燈)
                    this.textContent = partValue;
                    this.classList.add('success');
                    draggedPart.classList.add('hidden'); // 隱藏已使用的零件
                    consoleLog.innerHTML = `> MODULE [${partValue}] ACCEPTED.`;
                    consoleLog.style.color = "#3fb950";
                    
                    completedSlots++;
                    checkWinCondition();
                } else {
                    // 驗證失敗 (紅燈)
                    triggerError(this, partValue);
                }
            });
        });

        // 觸發紅燈與扣除穩定度
        function triggerError(slotElement, invalidValue) {
            slotElement.classList.add('error');
            consoleLog.innerHTML = `> INVALID FORMULA: [${invalidValue}] is rejected by the system.`;
            consoleLog.style.color = "#f85149";
            
            // 扣除穩定度
            stability -= 5;
            if (stability < 0) stability = 0;
            stabilityBar.textContent = `${stability}%`;
            if (stability < 80) stabilityBar.style.color = "#f85149";

            // 短暫延遲後移除紅燈效果 (迎合心急特質，快速重置)
            setTimeout(() => {
                slotElement.classList.remove('error');
            }, 500);
        }

        // 檢查是否完成所有插槽
        function checkWinCondition() {
            if (completedSlots === 3) {
                setTimeout(() => {
                    consoleLog.innerHTML = `
                        > DESTRUCTION (Success!) <br>
                        > De- (Down/Away) + Struct (Build) <br>
                        > Definition: The act of taking down or destroying something that was built.
                    `;
                    consoleLog.style.color = "#58a6ff";
                    
                    // 觸發整個藍圖發光特效
                    document.querySelector('.blueprint').style.borderColor = "#58a6ff";
                    document.querySelector('.blueprint').style.boxShadow = "0 0 20px rgba(88, 166, 255, 0.5)";
                }, 400);
            }
        }
    </script>
</body>
</html>
